<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Incolmotos Yamaha Pereira</title>
    <meta name="description" content="Visítanos en Incolmotos Yamaha Pereira: Calle 19 Sur #10-23, Pereira (Risaralda), en pleno Eje Cafetero. Escríbenos por WhatsApp, llámanos o envíanos un mensaje.">
    <meta name="keywords" content="contacto Yamaha Pereira, concesionario Yamaha Pereira, WhatsApp Yamaha, dirección Yamaha Pereira">
    <meta name="author" content="Incolmotos Yamaha Pereira">

    <meta property="og:title" content="Contacto | Incolmotos Yamaha Pereira">
    <meta property="og:description" content="Encuéntranos en Calle 19 Sur #10-23, Pereira. WhatsApp, teléfono y ubicación de tu Yamaha en el Eje Cafetero.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CO">

    <link rel="icon" href="../favicon.ico" sizes="any">
    <link rel="icon" href="../img/favicon-yamaha.png" type="image/png" sizes="96x96">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contacto - Incolmotos Yamaha Pereira",
        "mainEntity": {
            "@type": "LocalBusiness",
            "name": "Incolmotos Yamaha Pereira",
            "address": {
                "@type": "PostalAddress",
                "streetAddress": "Calle 19 Sur #10-23",
                "addressLocality": "Pereira",
                "addressRegion": "Risaralda",
                "addressCountry": "CO"
            },
            "telephone": "+573012914481",
            "email": "yamahaincolmotos290@gmail.com",
            "openingHours": "Mo-Sa 08:00-19:00"
        }
    }
    </script>
</head>
<body>

    <div id="site-header"></div>

    <!-- Hero -->
    <section class="hero hero--secondary">
        <div class="hero__bg">
            <picture>
                <source srcset="../img/motos/nmax-gris.webp" type="image/webp">
                <img src="../img/motos/nmax-gris.png" alt="Contacto Yamaha Motos Pereira" width="1200" height="800" loading="eager" fetchpriority="high">
            </picture>
            <div class="hero__gradient"></div>
        </div>
        <div class="hero__content" style="text-align:center;display:flex;flex-direction:column;align-items:center;">
            <span class="hero__label">Estamos para ti</span>
            <h1 class="hero__title">Contacto</h1>
            <p class="hero__subtitle">Visítanos en Pereira o escríbenos por WhatsApp</p>
        </div>
    </section>

    <!-- ==================== CONTACT SECTION ==================== -->
    <section class="contact-section">
        <div class="container">
            <div id="breadcrumb" style="margin-bottom:2rem;"></div>
            <div class="contact-layout">
                <!-- Formulario -->
                <div class="contact-form">
                    <h2>Contáctanos</h2>
                    <form id="contactForm" role="form" aria-label="Formulario de contacto">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                            <div class="form-group">
                                <label for="nombre">Nombre completo <span aria-hidden="true">*</span></label>
                                <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required aria-required="true" autocomplete="name">
                            </div>
                            <div class="form-group">
                                <label for="telefono">Teléfono</label>
                                <input type="tel" id="telefono" name="telefono" placeholder="+57 300 000 0000" autocomplete="tel">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo electrónico <span aria-hidden="true">*</span></label>
                            <input type="email" id="email" name="email" placeholder="tu@email.com" required aria-required="true" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="asunto">Asunto</label>
                            <select id="asunto" name="asunto" aria-label="Selecciona el asunto de tu consulta">
                                <option>Cotización Motocicleta</option>
                                <option>Servicio Técnico</option>
                                <option>Repuestos</option>
                                <option>Financiación</option>
                                <option>Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="mensaje">Mensaje <span aria-hidden="true">*</span></label>
                            <textarea id="mensaje" name="mensaje" placeholder="¿En qué podemos ayudarte?" required aria-required="true"></textarea>
                        </div>
                        <div class="form-consent">
                            <input type="checkbox" id="habeas" name="habeas" required aria-required="true">
                            <label for="habeas">He leído y acepto la <a href="politica-privacidad.html">Política de Privacidad</a> y autorizo el tratamiento de mis datos según la <a href="habeas-data.html">Política de Habeas Data</a> (Ley 1581 de 2012).</label>
                        </div>
                        <button type="submit" class="btn btn--primary btn--full btn--lg">Enviar Mensaje</button>
                    </form>
                </div>

                <!-- Info sidebar -->
                <div class="contact-info-sidebar">
                    <div id="contactInfoItems"></div>
                    <div class="contact-map" id="contactMap"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        YamahaComponents.renderHeader('contacto');
        YamahaComponents.renderBreadcrumb([
            { label: 'Inicio', url: '../index.html' },
            { label: 'Contacto' }
        ]);
        YamahaComponents.renderFooter();
        YamahaComponents.renderCookieBanner();
        YamahaComponents.renderWhatsAppFloat();
        YamahaComponents.renderContactInfo('contactInfoItems');
        document.getElementById('contactMap').innerHTML =
            '<iframe src="' + YamahaComponents.config.mapsUrl + '" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Ubicación Incolmotos Yamaha Pereira"></iframe>';
    </script>
</body>
</html>
